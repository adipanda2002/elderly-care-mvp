parser_cases:
  - id: parser_dehydration_basic
    text: I did not drink much water today. My mouth feels very dry and I am a little dizzy.
    expected:
      low_water_intake: yes
      dry_mouth: yes
      dizziness: yes

  - id: parser_hypoglycemia_basic
    text: I skipped breakfast, feel sweaty and dizzy, and I am starting to feel weak.
    expected:
      skipped_meal: yes
      sweating: yes
      dizziness: yes
      fatigue: yes

  - id: parser_viral_basic
    text: I feel tired, warm, and have a mild headache since this morning.
    expected:
      fatigue: yes
      mild_fever: yes
      headache: yes

  - id: parser_medication_basic
    text: I have high blood pressure, feel nauseous, and my mouth is dry after taking my medicine.
    expected:
      chronic_condition_flag: yes
      nausea: yes
      dry_mouth: yes

  - id: parser_negation_case
    text: I am dizzy but I have no fever and no chest pain.
    expected:
      dizziness: yes
      mild_fever: no
      chest_pain: no

  - id: parser_feeling_sick_case
    text: I am feeling sick and have chills.
    expected:
      fatigue: yes
      mild_fever: yes

  - id: parser_lost_appetite_case
    text: I feel ill and have lost appetite.
    expected:
      fatigue: yes

  - id: parser_lightheaded_dry_mouth_variant
    text: I am feeling lightheaded when standing and my mouth is feeling very dry.
    expected:
      dizziness: yes
      dry_mouth: yes

  - id: parser_thirst_low_water_variant
    text: I barely drank water and now I am very thirsty.
    expected:
      low_water_intake: yes
      dry_mouth: yes

  - id: parser_poor_sleep_headache_variant
    text: I am sleep deprived, woke up a lot, and have a morning headache.
    expected:
      poor_sleep: yes
      headache: yes

  - id: parser_clammy_hypoglycemia_variant
    text: I skipped breakfast and feel clammy and dizzy.
    expected:
      skipped_meal: yes
      sweating: yes
      dizziness: yes

  - id: parser_negated_nausea_and_fainting
    text: I do not feel nauseous and I have not fainted.
    expected:
      nausea: no
      fainting: no

  - id: parser_sparse_no_signal_case
    text: I just feel off today.
    expected: {}

ranking_cases:
  - id: ranking_dehydration
    evidence:
      low_water_intake: yes
      dry_mouth: yes
      dizziness: yes
      mild_fever: no
    expected_top1: dehydration
    acceptable_top2:
      - dehydration
      - medication_side_effect

  - id: ranking_hypoglycemia
    evidence:
      skipped_meal: yes
      sweating: yes
      dizziness: yes
      mild_fever: no
    expected_top1: hypoglycemia
    acceptable_top2:
      - hypoglycemia
      - dehydration

  - id: ranking_viral
    evidence:
      mild_fever: yes
      fatigue: yes
      headache: yes
      dry_mouth: no
    expected_top1: mild_viral_infection
    acceptable_top2:
      - mild_viral_infection
      - dehydration

  - id: ranking_medication
    evidence:
      chronic_condition_flag: yes
      nausea: yes
      dry_mouth: yes
      mild_fever: no
    expected_top1: medication_side_effect
    acceptable_top2:
      - medication_side_effect
      - dehydration

  - id: ranking_ambiguous_dehydration_vs_hypoglycemia
    evidence:
      skipped_meal: yes
      low_water_intake: yes
      dizziness: yes
      dry_mouth: yes
    expected_top1: dehydration
    acceptable_top2:
      - dehydration
      - hypoglycemia

  - id: ranking_dehydration_vs_medication_overlap
    evidence:
      low_water_intake: yes
      dry_mouth: yes
      nausea: yes
      chronic_condition_flag: yes
    expected_top1: dehydration
    acceptable_top2:
      - dehydration
      - medication_side_effect

  - id: ranking_medication_vs_dehydration_overlap
    evidence:
      chronic_condition_flag: yes
      dizziness: yes
      dry_mouth: yes
      nausea: yes
    expected_top1: medication_side_effect
    acceptable_top2:
      - medication_side_effect
      - dehydration

  - id: ranking_hypoglycemia_with_negative_dry_mouth
    evidence:
      skipped_meal: yes
      sweating: yes
      dizziness: yes
      dry_mouth: no
    expected_top1: hypoglycemia
    acceptable_top2:
      - hypoglycemia
      - dehydration

  - id: ranking_viral_with_nausea_overlap
    evidence:
      fatigue: yes
      headache: yes
      mild_fever: yes
      nausea: yes
    expected_top1: mild_viral_infection
    acceptable_top2:
      - mild_viral_infection
      - medication_side_effect

  - id: ranking_medication_with_negative_water_signal
    evidence:
      chronic_condition_flag: yes
      nausea: yes
      dry_mouth: yes
      mild_fever: no
      low_water_intake: no
    expected_top1: medication_side_effect
    acceptable_top2:
      - medication_side_effect
      - dehydration

safety_cases:
  - id: safety_chest_pain
    text: I feel dizzy and have chest tightness.
    expected_trigger: true
    expected_rule_id: chest_pain_emergency

  - id: safety_fainting
    text: I passed out earlier and now feel weak.
    expected_trigger: true
    expected_rule_id: fainting_emergency

  - id: safety_fall_plus_dizziness
    text: I fell down earlier and now I feel dizzy.
    expected_trigger: true
    expected_rule_id: dizziness_after_fall

  - id: safety_severe_confusion
    text: I am very confused and extremely disoriented.
    expected_trigger: true
    expected_rule_id: severe_confusion_emergency

  - id: safety_benign_negated_red_flag
    text: I am dizzy but I have no chest pain.
    expected_trigger: false
    expected_rule_id: ""

  - id: safety_benign_dehydration
    text: I did not drink much water today and my mouth feels dry.
    expected_trigger: false
    expected_rule_id: ""

  - id: safety_negated_fainting_and_chest_pain
    text: I have not fainted and I do not have chest pain, only a headache.
    expected_trigger: false
    expected_rule_id: ""

  - id: safety_non_severe_confusion_after_poor_sleep
    text: I am not thinking clearly after poor sleep, but I did not faint.
    expected_trigger: false
    expected_rule_id: ""

  - id: safety_negated_fall_with_dizziness
    text: I feel dizzy but I have not had a fall.
    expected_trigger: false
    expected_rule_id: ""

  - id: safety_negated_severe_confusion_phrase
    text: I am confused, but not very confused, and I did not faint.
    expected_trigger: false
    expected_rule_id: ""

  - id: safety_multiple_red_flags_precedence
    text: I fainted and also have chest pain.
    expected_trigger: true
    expected_rule_id: chest_pain_emergency

  - id: safety_fall_dizziness_without_fainting
    text: I did not faint, but I fell down earlier and now I feel dizzy.
    expected_trigger: true
    expected_rule_id: dizziness_after_fall
